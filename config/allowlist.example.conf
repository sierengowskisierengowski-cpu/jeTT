# jeTT allowlist + daemon trust — copy to /etc/jett/allowlist.conf
# Override: export JETT_ALLOWLIST=/path/to/allowlist.conf
#
# Guard own-stack ALLOW (before model):
#   exe:/path/prefix/       — fast ALLOW when exe starts with prefix
#   script:/path/prefix/    — fast ALLOW for python3 cmdline starting here
#
# Daemon Trusted disposition (0ms, no model):
#   trusted_path:/prefix/   — exe or cmdline contains prefix
#   trusted_proc:name         — comm or cmdline contains name (not lolbins)
#   toolchain_marker:substr   — exe path contains marker (build trees)
#   toolchain_bin:name        — comm name in build context
#
# Missing file → defaults derived from $HOME + system paths (/usr/bin/, etc.)

# --- Guard own-stack (replace /home/cosmic with install user) ---
exe:/home/cosmic/Scripts/utilities/
exe:/home/cosmic/Scripts/deployed/
exe:/home/cosmic/Projects/GNI/
exe:/home/cosmic/Projects/jeTT/
exe:/home/cosmic/Projects/bifrost/
exe:/home/cosmic/Projects/c2/
exe:/home/cosmic/Projects/meli-fresh/
exe:/home/cosmic/Projects/honeypot/
exe:/home/cosmic/.local/share/Steam/
exe:/home/cosmic/.cargo/
exe:/home/cosmic/.rustup/
exe:/tmp/cargo-install
script:/home/cosmic/Scripts/

# --- Daemon trusted paths (prefix match on exe or cmdline) ---
trusted_path:/home/cosmic/Projects/
trusted_path:/home/cosmic/Scripts/
trusted_path:/usr/bin/
trusted_path:/usr/lib/
trusted_path:/usr/share/
trusted_path:/etc/systemd/
trusted_path:/opt/jett/

