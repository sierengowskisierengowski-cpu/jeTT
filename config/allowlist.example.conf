# jeTT own-stack allowlist — copy to /etc/jett/allowlist.conf
# Override path: export JETT_ALLOWLIST=/path/to/allowlist.conf
#
# Format (one rule per line):
#   exe:/path/prefix/     — ALLOW when process exe starts with this prefix
#   script:/path/prefix/  — ALLOW for exe:/usr/bin/python3 when cmdline starts here
#
# If this file is missing, jeTT derives defaults from $HOME (Scripts/, Projects/, etc.).

# --- Example: GowskiNet lab (replace /home/cosmic with your install user) ---
exe:/home/cosmic/Scripts/utilities/
exe:/home/cosmic/Scripts/deployed/
exe:/home/cosmic/Projects/GNI/
exe:/home/cosmic/Projects/jeTT/
exe:/home/cosmic/Projects/bifrost/
exe:/home/cosmic/Projects/c2/
exe:/home/cosmic/Projects/meli-fresh/
exe:/home/cosmic/Projects/honeypot/
exe:/home/cosmic/.local/share/Steam/
exe:/home/cosmic/.cargo/
exe:/home/cosmic/.rustup/
exe:/tmp/cargo-install

script:/home/cosmic/Scripts/
